name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npx prettier --check .

      - name: Security audit (production)
        run: npm audit --audit-level=high --omit=dev

      - name: Security audit (dev, advisory)
        run: npm audit --audit-level=critical || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Vitest
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate data
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Verify static output
        run: |
          test -d out || (echo "Static export directory 'out' not found" && exit 1)
          test -f out/index.html || (echo "index.html not found in output" && exit 1)
          echo "Static export verified: $(find out -name '*.html' | wc -l) HTML files"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke test static export
        run: npx playwright test --config playwright.smoke.config.ts

      - name: Upload build output
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: static-output
          path: out/
          retention-days: 1

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-output
          path: out/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighthouse-results
          path: lighthouse-results/
          retention-days: 14

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: static-output
          path: out/

      - name: Measure bundle sizes
        id: sizes
        run: |
          # Define key routes to track
          ROUTES="index compare pricing hardware deals"
          MODEL_ROUTE="model"

          # Create size report
          echo "## Bundle Size Report" > size-report.md
          echo "" >> size-report.md
          echo "| Route | Raw Size | Gzipped Size | Status |" >> size-report.md
          echo "|-------|----------|--------------|--------|" >> size-report.md

          MAX_GZIP_BYTES=$((250 * 1024))
          EXCEEDED=false

          measure_route() {
            local route_name="$1"
            local route_path="$2"

            if [ ! -f "$route_path" ]; then
              echo "| \`${route_name}\` | - | - | Not found |" >> size-report.md
              return
            fi

            raw_bytes=$(wc -c < "$route_path")
            gzip_bytes=$(gzip -c "$route_path" | wc -c)

            # Convert to human-readable
            if [ "$raw_bytes" -ge 1048576 ]; then
              raw_hr="$(echo "scale=2; $raw_bytes / 1048576" | bc)MB"
            elif [ "$raw_bytes" -ge 1024 ]; then
              raw_hr="$(echo "scale=1; $raw_bytes / 1024" | bc)KB"
            else
              raw_hr="${raw_bytes}B"
            fi

            if [ "$gzip_bytes" -ge 1048576 ]; then
              gzip_hr="$(echo "scale=2; $gzip_bytes / 1048576" | bc)MB"
            elif [ "$gzip_bytes" -ge 1024 ]; then
              gzip_hr="$(echo "scale=1; $gzip_bytes / 1024" | bc)KB"
            else
              gzip_hr="${gzip_bytes}B"
            fi

            if [ "$gzip_bytes" -gt "$MAX_GZIP_BYTES" ]; then
              status="Exceeds 250KB gzipped"
              EXCEEDED=true
            else
              status="OK"
            fi

            echo "| \`${route_name}\` | ${raw_hr} | ${gzip_hr} | ${status} |" >> size-report.md
          }

          # Measure page-level HTML for each route
          for route in $ROUTES; do
            if [ "$route" = "index" ]; then
              measure_route "/" "out/index.html"
            else
              measure_route "/${route}" "out/${route}.html"
            fi
          done

          # Measure model/[id] via a sample model page
          sample_model=$(find out/model -name '*.html' -type f 2>/dev/null | head -1)
          if [ -n "$sample_model" ]; then
            measure_route "/model/[id]" "$sample_model"
          else
            echo "| \`/model/[id]\` | - | - | No model pages found |" >> size-report.md
          fi

          echo "" >> size-report.md

          # Measure JS chunks (shared across all routes)
          echo "### JavaScript Chunks" >> size-report.md
          echo "" >> size-report.md
          echo "| Chunk | Raw Size | Gzipped Size | Status |" >> size-report.md
          echo "|-------|----------|--------------|--------|" >> size-report.md

          # Find the _next/static/chunks directory
          CHUNKS_DIR=$(find out/_next/static/chunks -maxdepth 1 -name '*.js' -type f 2>/dev/null | sort)

          TOTAL_RAW=0
          TOTAL_GZIP=0

          for chunk in $CHUNKS_DIR; do
            chunk_name=$(basename "$chunk")
            raw_bytes=$(wc -c < "$chunk")
            gzip_bytes=$(gzip -c "$chunk" | wc -c)

            TOTAL_RAW=$((TOTAL_RAW + raw_bytes))
            TOTAL_GZIP=$((TOTAL_GZIP + gzip_bytes))

            if [ "$gzip_bytes" -ge 1024 ]; then
              gzip_hr="$(echo "scale=1; $gzip_bytes / 1024" | bc)KB"
            else
              gzip_hr="${gzip_bytes}B"
            fi

            if [ "$raw_bytes" -ge 1024 ]; then
              raw_hr="$(echo "scale=1; $raw_bytes / 1024" | bc)KB"
            else
              raw_hr="${raw_bytes}B"
            fi

            if [ "$gzip_bytes" -gt "$MAX_GZIP_BYTES" ]; then
              status="Exceeds 250KB gzipped"
              EXCEEDED=true
            else
              status="OK"
            fi

            echo "| \`${chunk_name}\` | ${raw_hr} | ${gzip_hr} | ${status} |" >> size-report.md
          done

          # Total JS size
          if [ "$TOTAL_GZIP" -ge 1048576 ]; then
            total_gzip_hr="$(echo "scale=2; $TOTAL_GZIP / 1048576" | bc)MB"
          elif [ "$TOTAL_GZIP" -ge 1024 ]; then
            total_gzip_hr="$(echo "scale=1; $TOTAL_GZIP / 1024" | bc)KB"
          else
            total_gzip_hr="${TOTAL_GZIP}B"
          fi

          if [ "$TOTAL_RAW" -ge 1048576 ]; then
            total_raw_hr="$(echo "scale=2; $TOTAL_RAW / 1048576" | bc)MB"
          elif [ "$TOTAL_RAW" -ge 1024 ]; then
            total_raw_hr="$(echo "scale=1; $TOTAL_RAW / 1024" | bc)KB"
          else
            total_raw_hr="${TOTAL_RAW}B"
          fi

          echo "" >> size-report.md
          echo "**Total JS:** ${total_raw_hr} raw, ${total_gzip_hr} gzipped" >> size-report.md
          echo "" >> size-report.md
          echo "_Threshold: 250KB gzipped per chunk_" >> size-report.md

          # Set outputs
          echo "exceeded=${EXCEEDED}" >> "$GITHUB_OUTPUT"

          # Print report to log
          cat size-report.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('size-report.md', 'utf8');

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- bundle-size-report -->';
            const body = `${marker}\n${report}`;
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Check size threshold
        if: steps.sizes.outputs.exceeded == 'true'
        run: |
          echo "::error::One or more route chunks exceed 250KB gzipped. See bundle size report above."
          exit 1
