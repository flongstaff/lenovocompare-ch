name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npx prettier --check .

      - name: Security audit
        run: npm audit --audit-level=high || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Vitest
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate data
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Verify static output
        run: |
          test -d out || (echo "Static export directory 'out' not found" && exit 1)
          test -f out/index.html || (echo "index.html not found in output" && exit 1)
          echo "Static export verified: $(find out -name '*.html' | wc -l) HTML files"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Smoke test static export
        run: npx playwright test --config playwright.smoke.config.ts
