<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — LenovoCompare CH</title>
    <style>
      :root {
        --background: #161616;
        --foreground: #f4f4f4;
        --accent: #0f62fe;
        --surface: #262626;
        --muted: #a8a8a8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: var(--background);
        color: var(--foreground);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
      }

      .container {
        text-align: center;
        max-width: 28rem;
      }

      .icon {
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.5rem;
        opacity: 0.5;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }

      .retry-btn {
        display: inline-block;
        background: var(--accent);
        color: #fff;
        border: none;
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      .retry-btn:hover {
        opacity: 0.85;
      }

      .retry-btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg
        class="icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <line x1="1" y1="1" x2="23" y2="23" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
      <h1>You're offline</h1>
      <p>Previously viewed pages are still available. Check your internet connection and try again.</p>
      <button class="retry-btn" onclick="window.location.reload()">Retry</button>
    </div>
  </body>
</html>
